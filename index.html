<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="Hypontech DocCenter" content="DocCenter">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="shortcut icon" href="img/favicon.ico">
</head>

<body>
  <script>
    console.log("爷们我写的！")
  </script>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'DocCenter',
      loadSidebar: true,
      topMergin: 5,
      loadNavbar: true,
      coverpage: true,
      onlyCover: false,
      // 文档内目录设置
      toc: {
        tocMaxLevel: 3,
        target: 'h1, h2, h3, h4, h5'
      },
      // tab功能
      tabs: {
        persist: true,
        sync: true,
        theme: 'classic'
      },
      // 搜索功能
      search: {
        placeholder: {
          '/zh-cn/': '搜索',
          '/': 'Search'
        },
        noData: {
          '/zh-cn/': '找不到结果',
          '/': 'No Results'
        },
        paths: 'auto'
      },
      copyCode: {
        buttonText: {
          '/zh-cn/': '点击复制',

          '/': 'Copy to clipboard'
        },
        errorText: {
          '/zh-cn/': '错误',
          '/': 'Error'
        },
        successText: {
          '/zh-cn/': '复制',
          '/': 'Copied'
        }
      },
      // 返回顶部功能
      scrollToTop: {
        auto: true,
        text: 'Top',
        right: 150,
        bottom: 85,
        offset: 500
      }
    }
  </script>
  <!-- Docsify latest -->
  <script src="//cdn.jsdelivr.net/npm/docsify"></script>
  <!-- 图片缩放功能 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <!-- 点击复制按钮 -->
  <script src="https://unpkg.com/docsify-copy-code"></script>
  <!-- 分页导航 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <!-- 搜索功能 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- tab功能 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
  <!-- 激活emoji -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
  <!-- TOC -->
  <script src="//unpkg.com/docsify-plugin-toc"></script>
  <!-- 提示 -->
  <script src="https://unpkg.com/docsify-plugin-flexible-alerts"></script>
  <!-- 折叠侧边栏 -->
  <!-- <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script> -->
  <!-- font-aweson -->
  <link rel="stylesheet" href="unpkg.com/@fortawesome/fontawesome-free/css/fontawesome.css" />
  <link rel="stylesheet" href="unpkg.com/@fortawesome/fontawesome-free/css/brands.css" />
  <link rel="stylesheet" href="unpkg.com/@fortawesome/fontawesome-free/css/regular.css" />
  <link rel="stylesheet" href="unpkg.com/@fortawesome/fontawesome-free/css/solid.css" />
  <!-- jquery -->
  <script src="//unpkg.com/docsify-scroll-to-top/dist/docsify-scroll-to-top.min.js"></script>
</body>

</html>
